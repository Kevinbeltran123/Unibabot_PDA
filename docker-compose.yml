services:
  redis:
    image: redis:7-alpine
    container_name: unibabot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api.Dockerfile
    container_name: unibabot-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/unibabot.db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-only-please-rotate}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SYNC_MODE: "0"
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./cache:/app/cache
      - ./PDAs:/app/PDAs:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker.Dockerfile
    container_name: unibabot-worker
    environment:
      DATABASE_URL: sqlite:////app/data/unibabot.db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./cache:/app/cache
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: unibabot-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api
    restart: unless-stopped
